<!-- 
    Projeto criado e desenvolvido pelo Gustavo Campelo no evento limitado chamado A Nova Era - Projeto Thor.

    Este projeto se baseia na criacao de uma landing page do thor ragnarok. Há um preloader, um video em formato de loop que fica no hero do site, uma janela de video mais a baixo e ao chegar numa parte do site, a medida que o usuario rola a pagina para baixo, o martelo mionir 3D segue o usuario e no fim há um footer moderno.

    Primeiramente foi desenvolvido no Figma a criacao do layout desde o começo. Tivemos que ter o cuidado de usar UX e UI Design neste projeto. É um projeto responsivo, podendo servir para varios dispositivos. Ao longo desse projeto, usamos boas praticas de programacao e semantica html, valorizando o SEO da nossa pagina, e a tivemos a atencao de usar imagens pequenas para fazer um projeto leve.

    Para esse projeto, utilizamos algumas IAs  para ajudar na velocidade da entrega desse projeto. Utilizamos o Gemini (BananaPro) para fazer as imagens do hero e do footer. Para anima-las em video em formato de loop, utilizamos a Flow. Embora utilizamos IAs nesse projetos, fizemos alguns ajustes/melhorias, animacoes e finalizacoes.

    Para elaborar o martelo 3D, utizamos um modelo pronto no Sketchfab e apenas instalamos no computador. Para melhorar a otimizacao para o nosso site, usamos o Blender para ajustar o martelo. Para finalizar, utlizamos outra ferramenta para comprimir este novo arquivo em formato glb.
 
    Aprendi com esse projeto metodos inteligentes para usar IA a me ajudar a desenvolver um projeto mais rapido, melhorando o meu prompt engenering. Tambem aprendi a criar e usar elementos 3D no site e onde buscar bons modelos 3D, sendo assim, tive o meu primeiro contato com a biblioteca Three.js. Tambem aprendi a usar e criar videos curtos no site para mante-los em loop.

    Usamos nesse projeto as tecnologias: html, css, javascript e suas bibliotecas three.js e gsap (scrollSmoother).
